<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Control Panel | Enzo</title>
    <style>
        :root {
            --primary: #00ff41; /* Classic Hacker Green */
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1c2c 0%, #0a0b10 100%);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .dashboard {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            width: 350px;
        }

        h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .stat-label { font-size: 0.7rem; color: #888; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--primary); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.3s;
        }

        .btn-deploy { background: var(--primary); color: black; }
        .btn-deploy:hover { box-shadow: 0 0 15px var(--primary); }

        .btn-danger { background: #ff4b2b; color: white; }
        .btn-danger:active { transform: scale(0.95); }

        #console-output {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            height: 40px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        /* Animation for the "Scanning" look */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="dashboard">
        <h1>Cloud Terminal</h1>
        <p style="font-size: 0.8rem; color: #00ff41;">> System: Stable</p>

        <div class="status-grid">
            <div class="stat-box">
                <div class="stat-label">CPU LOAD</div>
                <div class="stat-value" id="cpu">12%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">RAM USAGE</div>
                <div class="stat-value" id="ram">4.2GB</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-deploy" onclick="runDiagnostic()">RUN DIAGNOSTIC</button>
            <button class="btn-danger" onclick="selfDestruct()">SELF-DESTRUCT</button>
        </div>

        <div id="console-output">Awaiting user input...</div>
    </div>

    <script>
        function runDiagnostic() {
            const out = document.getElementById('console-output');
            out.innerText = "Scanning AWS S3 Buckets...";
            
            setTimeout(() => {
                document.getElementById('cpu').innerText = Math.floor(Math.random() * 99) + "%";
                document.getElementById('ram').innerText = (Math.random() * 16).toFixed(1) + "GB";
                out.innerText = "All systems green. Optimization complete.";
            }, 1500);
        }

        function selfDestruct() {
            if(confirm("Are you sure? This will (not really) delete the internet.")) {
                document.body.style.backgroundColor = "red";
                document.body.innerHTML = "<h1 style='color:white; text-align:center; width:100%; margin-top:20%'>CRITICAL ERROR: KERNEL PANIC</h1>";
                setTimeout(() => location.reload(), 3000);
            }
        }

        // Randomly jitter the CPU load for "realism"
        setInterval(() => {
            let cpu = document.getElementById('cpu');
            let current = parseInt(cpu.innerText);
            cpu.innerText = (current + (Math.random() > 0.5 ? 1 : -1)) + "%";
        }, 2000);
    </script>
</body>
</html>
