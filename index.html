<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linux Root Challenge | 10 Missions</title>
    <style>
        :root { --green: #00ff41; --bg: #050505; --warn: #ffb100; --error: #ff3e3e; }
        body { background: #121212; color: #eee; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .terminal { width: 850px; background: var(--bg); border: 1px solid #333; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header { background: #222; padding: 10px; font-size: 0.8rem; color: #888; border-bottom: 1px solid #333; }
        #output { height: 450px; padding: 20px; overflow-y: auto; white-space: pre-wrap; font-size: 0.95rem; }
        .input-line { display: flex; padding: 10px 20px 20px; border-top: 1px solid #1a1a1a; }
        input { background: transparent; border: none; color: var(--green); flex: 1; font-family: inherit; font-size: 1rem; outline: none; margin-left: 10px; }
        .prompt { color: var(--green); font-weight: bold; }
        .success { color: var(--green); }
        .fail { color: var(--error); }
        .hint { color: var(--warn); font-style: italic; }
        .progress-bar { width: 850px; height: 10px; background: #222; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--green); transition: 0.5s; }
    </style>
</head>
<body>

    <h2 style="color: var(--green)">AWS CLOUD OPS: EMERGENCY RESPONSE</h2>
    <div class="terminal">
        <div class="header">SESSION: ssh enzo@prod-instance-01 | PORT: 22</div>
        <div id="output"></div>
        <div class="input-line">
            <span class="prompt">enzo@aws:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off">
        </div>
    </div>

    <div class="progress-bar"><div id="progress-fill"></div></div>
    <p id="stats">Missions Completed: 0/10</p>

    <script>
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('output');
        const progress = document.getElementById('progress-fill');
        const stats = document.getElementById('stats');

        let currentStep = 0;
        let score = 0;

        // Pool of 15 questions to ensure variety (10 will be picked randomly)
        const questionPool = [
            { q: "A process with PID 404 is hung. Kill it immediately.", a: "kill -9 404" },
            { q: "The 'backup.sh' script isn't running. Give it execute permissions.", a: "chmod +x backup.sh" },
            { q: "Check the end of the 'access.log' file to see the latest errors.", a: "tail access.log" },
            { q: "Create a new directory named 'deploy' in the current folder.", a: "mkdir deploy" },
            { q: "Search for the word 'CRITICAL' in 'syslog.txt'.", a: "grep CRITICAL syslog.txt" },
            { q: "The Apache service is stuck. Restart it using systemctl.", a: "systemctl restart apache2" },
            { q: "Zip the 'logs' folder into a file named 'logs.zip'.", a: "zip -r logs.zip logs" },
            { q: "You need to see which ports are listening. Use netstat with -tulpn.", a: "netstat -tulpn" },
            { q: "Change the owner of 'web_root' folder to 'www-data'.", a: "chown www-data web_root" },
            { q: "Disk is full. Find the size of the '/var/log' directory in human-readable format.", a: "du -sh /var/log" },
            { q: "Edit 'config.yaml' using the 'vi' editor.", a: "vi config.yaml" },
            { q: "The server is lagging. Show real-time process monitoring.", a: "top" },
            { q: "Mount the drive '/dev/sdb1' to '/mnt/data'.", a: "mount /dev/sdb1 /mnt/data" },
            { q: "Echo the string 'Hello World' and append it to 'note.txt'.", a: "echo 'Hello World' >> note.txt" },
            { q: "Check your current path in the filesystem.", a: "pwd" }
        ];

        // Shuffle and pick 10
        const activeMissions = questionPool.sort(() => 0.5 - Math.random()).slice(0, 10);

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = msg;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function updateProgress() {
            const percent = (currentStep / 10) * 100;
            progress.style.width = percent + "%";
            stats.innerText = `Missions Completed: ${currentStep}/10`;
        }

        // Start
        log("SYSTEM BOOTED. Welcome Enzo.");
        log("10 Critical Issues detected on Lankacom Cloud Cluster.");
        log("-------------------------------------------------------");
        log(`MISSION 1: ${activeMissions[0].q}`, 'hint');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                input.value = '';
                log(`<span class="prompt">enzo@aws:~$</span> ${val}`);

                if (val === activeMissions[currentStep].a) {
                    log("✓ COMMAND ACCEPTED. Access Granted.", "success");
                    currentStep++;
                    updateProgress();

                    if (currentStep < 10) {
                        log(`\nMISSION ${currentStep + 1}: ${activeMissions[currentStep].q}`, 'hint');
                    } else {
                        log("\n========================================");
                        log("CONGRATULATIONS ENGINEER! SERVER STABILIZED.", "success");
                        log("Your AWS Infrastructure is now healthy.", "success");
                    }
                } else {
                    log("✗ ERROR: Command failed or invalid syntax.", "fail");
                    log(`HINT: Try checking the exact command requirements.`, "hint");
                }
            }
        });
    </script>
</body>
</html>
