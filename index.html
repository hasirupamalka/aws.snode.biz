<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linux Basics | Competitive Trace</title>
    <style>
        :root { --green: #00ff41; --bg: #0a0a0a; --panel: #111; }
        body { background: #1a1a1b; color: white; font-family: 'Consolas', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Layout */
        #game-area { display: none; flex-direction: column; align-items: center; }
        canvas { background: var(--bg); border: 2px solid #333; }
        #question-box { width: 600px; background: #222; padding: 15px; border-radius: 5px; margin-bottom: 10px; text-align: center; border-left: 5px solid var(--green); }
        
        /* Login Panel with Scores */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { 
            border: 2px solid var(--green); 
            padding: 30px; 
            background: #000; 
            width: 450px; 
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }
        input { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 10px; margin: 15px 0; width: 220px; text-align: center; outline: none; }
        
        .login-leaderboard {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #333;
            text-align: left;
        }
        .login-leaderboard h3 { font-size: 0.9rem; color: var(--green); margin-bottom: 10px; text-transform: uppercase; }
        .score-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 5px 0; border-bottom: 1px solid #222; }
        .refresh-tag { font-size: 0.6rem; color: #444; margin-top: 5px; font-style: italic; }

        .ui-panel { width: 600px; display: flex; justify-content: space-between; color: var(--green); margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="login-box">
            <h1 style="color: white; margin:0; font-size: 1.5rem;">LINUX TRACE LOGIN</h1>
            <p style="color: #666; font-size: 0.8rem;">Ready for 10 system questions?</p>
            
            <input type="text" id="username" placeholder="ENTER_NAME" maxlength="12" autofocus>
            <br>
            <button onclick="startGame()" style="background: var(--green); border:none; padding: 10px 40px; cursor:pointer; font-weight:bold; color: black;">INITIALIZE</button>

            <div class="login-leaderboard">
                <h3>System Hall of Fame</h3>
                <div id="login-score-list">Loading scores...</div>
                <div class="refresh-tag">Next sync in <span id="sync-timer">10</span>s</div>
            </div>
        </div>
    </div>

    <div id="game-area">
        <div class="ui-panel">
            <span>Engineer: <span id="stat-user"></span></span>
            <span>Accuracy: <span id="stat-score">0</span>%</span>
        </div>
        <div id="question-box">Establishing Connection...</div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const grid = 20;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}];
        let dx = grid, dy = 0, score = 0, currentQ = 0, user = "", targets = [], gameActive = false;
        let syncSeconds = 10;

        const missions = [
            { q: "See files in a folder?", a: "ls", options: ["ls", "dir", "view"] },
            { q: "Print working directory?", a: "pwd", options: ["path", "pwd", "where"] },
            { q: "Create a new folder?", a: "mkdir", options: ["new", "mkdir", "md"] },
            { q: "Change directory?", a: "cd", options: ["go", "mov", "cd"] },
            { q: "Remove a file?", a: "rm", options: ["del", "rm", "kill"] },
            { q: "Create empty file?", a: "touch", options: ["new", "touch", "file"] },
            { q: "View file contents?", a: "cat", options: ["cat", "read", "open"] },
            { q: "Clear terminal?", a: "clear", options: ["cls", "reset", "clear"] },
            { q: "Check current user?", a: "whoami", options: ["whoami", "user", "id"] },
            { q: "Manual for a command?", a: "man", options: ["help", "man", "info"] }
        ];

        // --- SCORES & SYNC LOGIC ---
        function updateLeaderboard() {
            const list = JSON.parse(localStorage.getItem('sidebar_scores') || "[]");
            const container = document.getElementById('login-score-list');
            if (list.length === 0) {
                container.innerHTML = "<div style='color:#444'>No records found.</div>";
            } else {
                container.innerHTML = list.map(i => `
                    <div class="score-row"><span>${i.n}</span><span>${i.s}%</span></div>
                `).join('');
            }
        }

        // Auto-refresh timer
        setInterval(() => {
            syncSeconds--;
            if (syncSeconds < 0) {
                updateLeaderboard();
                syncSeconds = 10;
            }
            document.getElementById('sync-timer').innerText = syncSeconds;
        }, 1000);

        // Run once on load
        updateLeaderboard();

        function startGame() {
            user = document.getElementById('username').value.trim() || "Guest";
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('stat-user').innerText = user;
            gameActive = true;
            nextQuestion();
            main();
        }

        // --- GAME LOGIC ---
        function nextQuestion() {
            if(currentQ >= 10) return endGame("SYSTEM PATCHED");
            document.getElementById('question-box').innerText = `TASK ${currentQ + 1}: ${missions[currentQ].q}`;
            targets = [];
            let pool = [...missions[currentQ].options].sort(() => 0.5 - Math.random());
            for(let i=0; i<3; i++) {
                targets.push({ x: Math.floor(Math.random() * (canvas.width/grid)) * grid, y: Math.floor(Math.random() * (canvas.height/grid)) * grid, text: pool[i] });
            }
        }

        function main() {
            if(!gameActive) return;
            setTimeout(() => {
                ctx.fillStyle = "#0a0a0a";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawTargets();
                advanceSnake();
                drawSnake();
                main();
            }, 200); 
        }

        function drawSnake() {
            ctx.fillStyle = "#00ff41";
            snake.forEach(part => ctx.fillRect(part.x, part.y, grid-2, grid-2));
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) return endGame("FIREWALL COLLISION");
            
            snake.unshift(head);
            let hit = false;
            targets.forEach(t => {
                if(head.x === t.x && head.y === t.y) {
                    hit = true;
                    if(t.text === missions[currentQ].a) {
                        score += 10;
                        document.getElementById('stat-score').innerText = score;
                    } else {
                        snake = [{x: head.x, y: head.y}];
                    }
                    currentQ++;
                    nextQuestion();
                }
            });
            if(!hit) snake.pop();
        }

        function drawTargets() {
            targets.forEach(t => {
                ctx.fillStyle = "#fff";
                ctx.fillRect(t.x, t.y, grid-2, grid-2);
                ctx.font = "bold 11px Arial";
                ctx.fillText(t.text, t.x - 10, t.y - 5);
            });
        }

        function saveScore(n, s) {
            let scores = JSON.parse(localStorage.getItem('sidebar_scores') || "[]");
            scores.push({n, s});
            scores.sort((a,b) => b.s - a.s);
            localStorage.setItem('sidebar_scores', JSON.stringify(scores.slice(0, 5)));
            updateLeaderboard(); // Update immediately too
        }

        function endGame(msg) {
            gameActive = false;
            alert(msg + "\nFinal Score: " + score + "%");
            saveScore(user, score);
            location.reload(); // Go back to login screen to see update
        }

        window.addEventListener("keydown", e => {
            if(e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
            if(e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
            if(e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
            if(e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
        });
    </script>
</body>
</html>
