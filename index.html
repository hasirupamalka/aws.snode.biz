<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Engineer Puzzle</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --tile: #1e293b;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tile {
            width: 80px;
            height: 80px;
            background: var(--tile);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
            border-bottom: 4px solid rgba(0,0,0,0.3);
        }

        .tile:hover {
            background: #334155;
            box-shadow: 0 0 15px var(--primary);
        }

        .tile.empty {
            background: transparent;
            cursor: default;
            border: none;
            box-shadow: none;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        #message { font-weight: bold; color: #4ade80; height: 20px; }
    </style>
</head>
<body>

    <h1>Logic Puzzle</h1>
    <div id="message"></div>
    <div class="game-container" id="grid"></div>

    <div class="controls">
        <div>Moves: <span id="move-count">0</span></div>
        <button onclick="shuffleGame()">Reset System</button>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const moveDisplay = document.getElementById('move-count');
        const message = document.getElementById('message');
        
        let tiles = [...Array(15).keys()].map(i => i + 1);
        tiles.push(null); // The empty space
        let moves = 0;

        function createBoard() {
            gridElement.innerHTML = '';
            tiles.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.classList.add('tile');
                if (tile === null) {
                    tileDiv.classList.add('empty');
                    tileDiv.innerText = '';
                } else {
                    tileDiv.innerText = tile;
                    tileDiv.addEventListener('click', () => moveTile(index));
                }
                gridElement.appendChild(tileDiv);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(null);
            const validMoves = [index - 1, index + 1, index - 4, index + 4];

            // Check if move is valid (adjacent and not wrapping rows)
            const isAdjacent = validMoves.includes(emptyIndex);
            const isSameRow = Math.floor(index / 4) === Math.floor(emptyIndex / 4);
            const isSameCol = index % 4 === emptyIndex % 4;

            if (isAdjacent && (isSameRow || isSameCol)) {
                swap(index, emptyIndex);
                moves++;
                moveDisplay.innerText = moves;
                createBoard();
                checkWin();
            }
        }

        function swap(idx1, idx2) {
            const temp = tiles[idx1];
            tiles[idx1] = tiles[idx2];
            tiles[idx2] = temp;
        }

        function shuffleGame() {
            // Shuffle by simulating random valid moves so the puzzle is always solvable
            for (let i = 0; i < 200; i++) {
                const emptyIndex = tiles.indexOf(null);
                const neighbors = [];
                if (emptyIndex % 4 > 0) neighbors.push(emptyIndex - 1);
                if (emptyIndex % 4 < 3) neighbors.push(emptyIndex + 1);
                if (emptyIndex > 3) neighbors.push(emptyIndex - 4);
                if (emptyIndex < 12) neighbors.push(emptyIndex + 4);
                
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(emptyIndex, randomNeighbor);
            }
            moves = 0;
            moveDisplay.innerText = moves;
            message.innerText = "";
            createBoard();
        }

        function checkWin() {
            const winState = [...Array(15).keys()].map(i => i + 1);
            winState.push(null);
            if (JSON.stringify(tiles) === JSON.stringify(winState)) {
                message.innerText = "SYSTEM OPTIMIZED: YOU WIN!";
            }
        }

        shuffleGame(); // Initialize
    </script>
</body>
</html>
