<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chaos: The Puzzle</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ff0055;
            --secondary: #00f2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Login Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: #111;
            padding: 40px;
            border: 2px solid var(--accent);
            text-align: center;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            background: #222;
            border: 1px solid var(--secondary);
            color: white;
            margin-bottom: 20px;
            width: 200px;
            text-align: center;
        }

        /* Game UI */
        .game-wrapper { display: none; text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: var(--glass);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--secondary);
        }

        .tile {
            width: 100px; height: 100px;
            background: #1a1a1a;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            border: 1px solid #333;
        }

        .tile:hover { background: #333; transform: scale(1.05); }
        .tile.empty { background: transparent; border: none; cursor: default; }

        /* Leaderboard */
        .leaderboard {
            margin-top: 30px;
            width: 300px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        table { width: 100%; font-size: 0.9rem; }
        th { color: var(--accent); }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }

        button {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #funny-msg { color: #888; margin: 10px 0; font-style: italic; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="login-box">
            <h2 style="color: var(--accent)">SYSTEM ACCESS REQUIRED</h2>
            <p>Enter your SysAdmin handle to begin:</p>
            <input type="text" id="username" placeholder="Guest_User" maxlength="12"><br>
            <button onclick="startGame()">INITIALIZE</button>
        </div>
    </div>

    <div class="game-wrapper" id="game-ui">
        <h1 id="welcome-msg"></h1>
        <div id="funny-msg">Status: Servers are on fire. Fix them.</div>
        
        <div class="grid" id="grid"></div>

        <div style="margin-top: 20px;">
            Moves: <span id="move-count" style="color: var(--accent)">0</span>
            <button onclick="shuffle()" style="margin-left: 20px; background: #444;">Panic Reset</button>
        </div>

        <div class="leaderboard">
            <h3>Top Engineers (Best Scores)</h3>
            <div id="score-list"></div>
        </div>
    </div>

    <script>
        let currentPlayer = "";
        let moves = 0;
        let tiles = [1, 2, 3, 4, 5, 6, 7, 8, null];
        const gridElement = document.getElementById('grid');
        
        const funnyInsults = [
            "My grandma clicks faster than this.",
            "Are you sure you're a Cloud Engineer?",
            "AWS is charging you $0.01 for every wrong move.",
            "Error 404: Skill not found.",
            "The server is melting... hurry up!"
        ];

        function startGame() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert("You need a name to be blamed for the crash!");
            currentPlayer = name;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "User: " + currentPlayer;
            updateLeaderboard();
            shuffle();
        }

        function createBoard() {
            gridElement.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.classList.add('tile');
                if (tile === null) div.classList.add('empty');
                else {
                    div.innerText = "SRV-" + tile;
                    div.onclick = () => move(index);
                }
                gridElement.appendChild(div);
            });
        }

        function move(index) {
            const empty = tiles.indexOf(null);
            const isAdj = [index-1, index+1, index-3, index+3].includes(empty);
            
            // Prevent row wrapping
            const wrap = (index % 3 === 0 && empty === index - 1) || (index % 3 === 2 && empty === index + 1);

            if (isAdj && !wrap) {
                [tiles[index], tiles[empty]] = [tiles[empty], tiles[index]];
                moves++;
                document.getElementById('move-count').innerText = moves;
                if (moves % 5 === 0) {
                    document.getElementById('funny-msg').innerText = "Status: " + funnyInsults[Math.floor(Math.random()*funnyInsults.length)];
                }
                createBoard();
                checkWin();
            }
        }

        function shuffle() {
            // Real shuffle to ensure solvability
            for (let i = 0; i < 100; i++) {
                const empty = tiles.indexOf(null);
                const possible = [empty-1, empty+1, empty-3, empty+3].filter(x => x >= 0 && x < 9);
                const random = possible[Math.floor(Math.random() * possible.length)];
                [tiles[empty], tiles[random]] = [tiles[random], tiles[empty]];
            }
            moves = 0;
            document.getElementById('move-count').innerText = moves;
            createBoard();
        }

        function checkWin() {
            if (tiles.join(',') === "1,2,3,4,5,6,7,8,") {
                alert("CONGRATS! You fixed the cloud in " + moves + " moves.");
                saveScore(currentPlayer, moves);
                shuffle();
            }
        }

        function saveScore(name, score) {
            let scores = JSON.parse(localStorage.getItem('cloud_scores') || "[]");
            scores.push({ name, score });
            scores.sort((a, b) => a.score - b.score); // Lower is better
            scores = scores.slice(0, 5); // Keep top 5
            localStorage.setItem('cloud_scores', JSON.stringify(scores));
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('cloud_scores') || "[]");
            const list = document.getElementById('score-list');
            list.innerHTML = scores.map(s => `
                <div class="score-row">
                    <span>${s.name}</span>
                    <span>${s.score} Moves</span>
                </div>
            `).join('') || "No deployments yet.";
        }
    </script>
</body>
</html>
